<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HealthClaw Guardrails — the security layer between AI agents and clinical data">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#071019"/>
      <stop offset="0.55" stop-color="#0a2230"/>
      <stop offset="1" stop-color="#0b1430"/>
    </linearGradient>
    <linearGradient id="shield" x1="120" y1="90" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="claw" x1="160" y1="150" x2="290" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="title" x1="430" y1="120" x2="1180" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- connected-node backdrop -->
  <g stroke="#1e7d8c" stroke-width="1" opacity="0.35">
    <line x1="980" y1="60" x2="1090" y2="120"/><line x1="1090" y1="120" x2="1040" y2="230"/>
    <line x1="1040" y1="230" x2="1160" y2="280"/><line x1="1090" y1="120" x2="1200" y2="90"/>
    <line x1="980" y1="60" x2="900" y2="160"/><line x1="900" y1="160" x2="1040" y2="230"/>
    <line x1="900" y1="160" x2="840" y2="300"/><line x1="840" y1="300" x2="1000" y2="340"/>
    <line x1="1160" y1="280" x2="1220" y2="200"/><line x1="1040" y1="230" x2="1000" y2="340"/>
  </g>
  <g fill="#38bdf8" opacity="0.55">
    <circle cx="980" cy="60" r="3.5"/><circle cx="1090" cy="120" r="4.5"/><circle cx="1040" cy="230" r="4"/>
    <circle cx="1160" cy="280" r="3.5"/><circle cx="1200" cy="90" r="3"/><circle cx="900" cy="160" r="4"/>
    <circle cx="840" cy="300" r="3"/><circle cx="1000" cy="340" r="3.5"/><circle cx="1220" cy="200" r="3"/>
  </g>

  <!-- shield emblem -->
  <g transform="translate(215 200)" filter="url(#glow)">
    <path d="M0 -118 L96 -78 V18 C96 78 52 112 0 132 C-52 112 -96 78 -96 18 V-78 Z"
          fill="url(#shield)"/>
    <path d="M0 -118 L96 -78 V18 C96 78 52 112 0 132 C-52 112 -96 78 -96 18 V-78 Z"
          fill="none" stroke="#e0fbff" stroke-opacity="0.45" stroke-width="2"/>
    <!-- claw / pincer mark -->
    <g fill="url(#claw)">
      <path d="M-6 -58 C-46 -58 -70 -24 -70 14 C-70 50 -46 74 -14 80 L-14 52
               C-32 47 -44 33 -44 14 C-44 -8 -30 -30 -6 -30 Z"/>
      <path d="M6 -58 C46 -58 70 -24 70 14 C70 50 46 74 14 80 L14 52
               C32 47 44 33 44 14 C44 -8 30 -30 6 -30 Z"/>
    </g>
    <!-- health cross core -->
    <rect x="-12" y="-22" width="24" height="64" rx="6" fill="#0b1430"/>
    <rect x="-32" y="-2" width="64" height="24" rx="6" fill="#0b1430"/>
    <rect x="-9" y="-19" width="18" height="58" rx="4" fill="#e0fbff"/>
    <rect x="-29" y="1" width="58" height="18" rx="4" fill="#e0fbff"/>
  </g>

  <!-- wordmark -->
  <text x="430" y="150" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="74" font-weight="800" fill="url(#title)">HealthClaw</text>
  <text x="430" y="232" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="74" font-weight="800" fill="#e2e8f0" letter-spacing="1">Guardrails</text>
  <text x="434" y="282" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="26" font-weight="500" fill="#94a3b8">The security layer between AI agents and clinical data.</text>

  <!-- capability pills -->
  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="17" font-weight="600">
    <g transform="translate(434 312)">
      <rect width="168" height="34" rx="17" fill="#0ea5e9" fill-opacity="0.16" stroke="#38bdf8" stroke-opacity="0.45"/>
      <text x="84" y="23" text-anchor="middle" fill="#7dd3fc">PHI Redaction</text>
    </g>
    <g transform="translate(614 312)">
      <rect width="150" height="34" rx="17" fill="#2dd4bf" fill-opacity="0.16" stroke="#2dd4bf" stroke-opacity="0.45"/>
      <text x="75" y="23" text-anchor="middle" fill="#5eead4">Audit Trail</text>
    </g>
    <g transform="translate(776 312)">
      <rect width="158" height="34" rx="17" fill="#fb7185" fill-opacity="0.16" stroke="#fb7185" stroke-opacity="0.45"/>
      <text x="79" y="23" text-anchor="middle" fill="#fda4af">Step-Up Auth</text>
    </g>
    <g transform="translate(946 312)">
      <rect width="178" height="34" rx="17" fill="#a78bfa" fill-opacity="0.16" stroke="#a78bfa" stroke-opacity="0.45"/>
      <text x="89" y="23" text-anchor="middle" fill="#c4b5fd">Tenant Isolation</text>
    </g>
  </g>
</svg>
