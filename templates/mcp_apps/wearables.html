<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wearables · HealthClaw</title>
<meta name="mcp-app" content="wearables">
<style>
  :root{
    --bg:#0b0f14;--panel:#0f141b;--ink:#dbe3ef;--dim:#7b8496;
    --border:#1c242f;--cyan:#22d3ee;--green:#34d399;--amber:#fbbf24;
    --red:#f87171;--mono:ui-monospace,SFMono-Regular,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .wrap{max-width:1080px;margin:0 auto;padding:24px}
  header{display:flex;align-items:center;justify-content:space-between;
    padding-bottom:16px;border-bottom:1px solid var(--border);
    margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .title{font-size:18px;font-weight:600}
  .title small{display:block;color:var(--dim);font-size:12px;margin-top:2px;
    font-family:var(--mono)}
  .pill{padding:4px 10px;border-radius:999px;font-size:12px;
    border:1px solid var(--border);background:var(--panel)}
  .pill.ok{color:var(--green);border-color:rgba(52,211,153,.3)}
  .pill.warn{color:var(--amber);border-color:rgba(251,191,36,.3)}
  .pill.err{color:var(--red);border-color:rgba(248,113,113,.3)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:14px}
  .card{background:var(--panel);border:1px solid var(--border);
    border-radius:8px;padding:16px}
  .card h3{margin:0 0 8px;font-size:15px;font-weight:600;text-transform:capitalize}
  .card .meta{color:var(--dim);font-size:12px;font-family:var(--mono);
    line-height:1.8}
  .card .actions{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}
  button,.btn{background:transparent;color:var(--ink);
    border:1px solid var(--border);padding:7px 14px;border-radius:6px;
    font-size:12.5px;cursor:pointer;font-family:inherit;text-decoration:none;
    display:inline-block}
  button:hover,.btn:hover{border-color:var(--cyan);color:var(--cyan)}
  button.primary{border-color:var(--green);color:var(--green)}
  button.primary:hover{background:rgba(52,211,153,.08)}
  button:disabled{opacity:0.4;cursor:not-allowed;border-color:var(--border);
    color:var(--dim)}
  .empty{color:var(--dim);padding:24px;text-align:center}
  .err-box{color:var(--red);padding:12px;background:rgba(248,113,113,.06);
    border:1px solid rgba(248,113,113,.2);border-radius:6px;margin:0 0 16px}
  .tenant-input{background:var(--panel);color:var(--ink);
    border:1px solid var(--border);padding:6px 10px;border-radius:6px;
    font-family:var(--mono);font-size:12px;min-width:180px}
  .footer-note{color:var(--dim);font-size:11.5px;font-family:var(--mono);
    margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="title">
    Wearables
    <small>Open Wearables &middot; tenant <span id="tenant-label">—</span></small>
  </div>
  <div>
    <input id="tenant-input" class="tenant-input"
           placeholder="tenant_id" value="{{ tenant_id }}">
    <button id="btn-refresh">Refresh</button>
  </div>
</header>

<div id="err-slot"></div>

<div id="status-line" style="color:var(--dim);font-size:12.5px;margin-bottom:14px">
  Loading…
</div>

<div class="grid" id="grid"></div>

<div class="footer-note">
  Wearable samples flow through HealthClaw Guardrails as FHIR Observations
  with LOINC codes, device Provenance, and the usual redaction/audit
  guarantees. Connection tokens are held by the Open Wearables sidecar,
  not this server.
</div>
</div>

<script>
  const INITIAL_TENANT = {{ tenant_id | tojson }};
  let tenant = INITIAL_TENANT || 'desktop-demo';

  async function fetchJSON(url, opts){
    const res = await fetch(url, opts || {});
    if(!res.ok){
      const t = await res.text();
      throw new Error(`HTTP ${res.status}: ${t.slice(0,200)}`);
    }
    return res.json();
  }

  function fmtAgo(iso){
    if(!iso) return 'never';
    const d = new Date(iso);
    const mins = Math.round((Date.now() - d.getTime())/60000);
    if(mins < 1) return 'just now';
    if(mins < 60) return mins + ' min ago';
    const hrs = Math.round(mins/60);
    if(hrs < 24) return hrs + ' h ago';
    return Math.round(hrs/24) + ' d ago';
  }

  function statusPill(status){
    if(status === 'ok') return '<span class="pill ok">synced</span>';
    if(status === 'error') return '<span class="pill err">error</span>';
    return '<span class="pill warn">pending</span>';
  }

  function renderProviderCard(provider, conn){
    const name = provider.name;
    const configured = provider.configured;
    const isConnected = !!conn;
    const actions = [];
    if(isConnected){
      actions.push(`<button class="primary"
        onclick="syncNow()">Sync now</button>`);
      actions.push(`<a class="btn" href="/wearables/oauth/start?provider=${encodeURIComponent(name)}&tenant_id=${encodeURIComponent(tenant)}">Re-auth</a>`);
    } else if(configured){
      actions.push(`<a class="btn primary" href="/wearables/oauth/start?provider=${encodeURIComponent(name)}&tenant_id=${encodeURIComponent(tenant)}">Connect</a>`);
    } else {
      actions.push(`<button disabled title="Admin: set ${name.toUpperCase()}_CLIENT_ID">Not configured</button>`);
    }

    const meta = isConnected
      ? `last sync: ${fmtAgo(conn.last_sync_at)}<br>` +
        `observations: ${conn.observation_count || 0}<br>` +
        `status: ${conn.last_sync_status}` +
        (conn.last_sync_detail
          ? `<br><span style="color:var(--amber)">${conn.last_sync_detail}</span>`
          : '')
      : (configured ? 'not connected' : 'OAuth app not set up by operator');

    const pill = isConnected ? statusPill(conn.last_sync_status) : '';

    return `<div class="card">
      <h3>${name} ${pill}</h3>
      <div class="meta">${meta}</div>
      <div class="actions">${actions.join('')}</div>
    </div>`;
  }

  async function load(){
    document.getElementById('tenant-label').textContent = tenant;
    document.getElementById('err-slot').innerHTML = '';
    try {
      const [providersResp, statusResp] = await Promise.all([
        fetchJSON('/wearables/providers'),
        fetchJSON('/wearables/sync-status?tenant_id=' + encodeURIComponent(tenant)),
      ]);
      const providers = providersResp.providers || [];
      const connections = statusResp.connections || [];
      const byProvider = {};
      for(const c of connections){ byProvider[c.provider] = c; }

      if(!providersResp.enabled){
        document.getElementById('status-line').innerHTML =
          '<span style="color:var(--amber)">OPEN_WEARABLES_URL not set on the server. Set it in the environment to enable wearable sync. Cards below reflect the default provider list.</span>';
      } else {
        const connected = connections.length;
        document.getElementById('status-line').textContent =
          `${connected} connection${connected===1?'':'s'} · poll runs every ${Math.round((900)/60)} min by default`;
      }

      const grid = document.getElementById('grid');
      grid.innerHTML = providers.map(p =>
        renderProviderCard(p, byProvider[p.name] || null)
      ).join('');
      if(!providers.length){
        grid.innerHTML = '<div class="empty">No providers available.</div>';
      }
    } catch (e) {
      document.getElementById('err-slot').innerHTML =
        '<div class="err-box">' + e.message + '</div>';
    }
  }

  async function syncNow(){
    try {
      // Browser can't mint a step-up token; surface a helpful message.
      alert('Manual sync requires a step-up token. From an MCP client, use the wearables_sync_status tool or run the poller loop.');
    } catch (e) {
      alert('Sync failed: ' + e.message);
    }
  }

  document.getElementById('btn-refresh').addEventListener('click', ()=>{
    tenant = document.getElementById('tenant-input').value.trim() || 'desktop-demo';
    load();
  });
  document.getElementById('tenant-input').addEventListener('keypress', (e)=>{
    if(e.key === 'Enter'){
      tenant = e.target.value.trim() || 'desktop-demo';
      load();
    }
  });

  load();
</script>
</body>
</html>
