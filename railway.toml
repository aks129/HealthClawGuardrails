# Railway deployment configuration
# https://docs.railway.app/reference/config-as-code
#
# Maps the existing docker-compose.yml services to Railway.
# Redis is provisioned as a Railway plugin (one click in the dashboard).
#
# Deploy:
#   1. railway login && railway link
#   2. Add Redis plugin in Railway dashboard → copy REDIS_URL
#   3. railway variables set STEP_UP_SECRET=... FASTEN_PUBLIC_KEY=... etc.
#   4. railway up

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**/*.py", "templates/**", "static/**", "pyproject.toml"]

[deploy]
healthcheckPath = "/r6/fhir/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# --timeout 300: allows 5-minute background threads to complete without
# gunicorn killing the worker during large Fasten NDJSON downloads.
# (Fasten exports can be 30MB–3GB; streaming runs in daemon threads, not
# the gunicorn request cycle, but the worker must stay alive.)
