<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CareAgents — your personal care agent{% endblock %}</title>
  <meta name="description" content="Spin up a personal health agent in under a minute. Every read redacted, every access audited, every action approved by you — guardrailed by HealthClaw.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,560;0,9..144,700;1,9..144,400&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='careagents.css') }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
  {% block head %}{% endblock %}
</head>
<body class="{% block bodyclass %}{% endblock %}">
  <header class="topbar">
    <a class="wordmark" href="/">care<span>agents</span></a>
    <a class="guardrail-tag" href="https://healthclaw.io" target="_blank" rel="noopener">
      <svg width="13" height="15" viewBox="0 0 13 15" fill="none" aria-hidden="true"><path d="M6.5 1 12 3.2v4.1c0 3.4-2.3 5.7-5.5 6.7C3.3 13 1 10.7 1 7.3V3.2L6.5 1Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      guardrailed by HealthClaw
    </a>
  </header>
  {% block content %}{% endblock %}
  <footer class="footer">
    <div>Open source, end to end — <a href="https://github.com/aks129/HealthClawGuardrails" target="_blank" rel="noopener">the guardrail layer</a> grades itself in public.</div>
    <div class="footer-fine">CareAgents is decision support, not medical advice. In an emergency, call 911.</div>
  </footer>
</body>
</html>
