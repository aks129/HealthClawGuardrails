# Agent registry for the command center.
#
# Each agent is a named health persona that coordinates a subset of skills +
# MCP tools. Audit events are attributed to an agent via `tool_patterns` (tool
# names that this agent typically invokes) and/or an explicit agent_id recorded
# on the event. Conversations and tasks carry agent_id so the dashboard can
# group work by persona.
#
# Default registry — 6 named personas covering primary care, medication,
# fitness, strategic advice, family coordination, and service optimization.
# Users can customize by editing this file and redeploying; future versions
# will support per-user agent rosters from agent_templates.yaml.

agents:
  - id: sally
    name: Sally
    role: PCP Advisor
    emoji: "🩺"
    color: "#2563eb"
    description: >
      Your primary care coordinator. Sally reviews your conditions and
      vitals, flags preventive screening gaps against USPSTF guidelines,
      and helps you prepare for PCP visits. First stop for "what's my
      overall health status?"
    skills:
      - curatr
      - personal-health-records
      - fhir-r6-guardrails
    tool_patterns:
      - fhir_search
      - fhir_read
      - fhir_lastn
      - fhir_stats
    example_prompts:
      - "What preventive care am I overdue for?"
      - "Summarize my active conditions and recent labs"
      - "Help me prepare questions for my next PCP visit"

  - id: mary
    name: Mary
    role: Pharmacy Helper
    emoji: "💊"
    color: "#9333ea"
    description: >
      Medication coordinator. Mary tracks your active prescriptions,
      flags potential interactions, reminds you of refills, and can
      explain what each medication does in plain language.
    skills:
      - curatr
      - fhir-r6-guardrails
    tool_patterns:
      - fhir_search
      - fhir_read
    example_prompts:
      - "What medications am I currently taking?"
      - "Any potential interactions in my list?"
      - "When do I need to refill my prescriptions?"

  - id: dom
    name: Dom
    role: Fitness Coach
    emoji: "🏃"
    color: "#16a34a"
    description: >
      Fitness and activity coach. Dom pulls your wearable data
      (Fitbit, Oura, Whoop, Apple Health) plus clinical vitals to
      track workouts, sleep, recovery, and progress against goals.
    skills:
      - fhir-r6-guardrails
    tool_patterns:
      - fhir_search
      - fhir_read
      - fhir_stats
      - wearable_sync_status
    example_prompts:
      - "How did I sleep and recover this week?"
      - "Am I on track with my weight / steps / HR targets?"
      - "Summarize my activity for the month"

  - id: shervin
    name: Shervin
    role: Health Advisor
    emoji: "🧠"
    color: "#0891b2"
    description: >
      Strategic health advisor. Shervin connects the dots across your
      whole record — lab trends, conditions, medications, and family
      history — to suggest preventive strategies, second-opinion
      questions, and long-term health plans.
    skills:
      - curatr
      - personal-health-records
      - fhir-r6-guardrails
    tool_patterns:
      - fhir_search
      - fhir_read
      - fhir_lastn
      - fhir_stats
    example_prompts:
      - "What long-term health trends should I watch?"
      - "Help me think through a second opinion for X"
      - "Any patterns across my conditions I should discuss with a specialist?"

  - id: ronny
    name: Ronny
    role: Family Manager
    emoji: "👨‍👩‍👧"
    color: "#c2410c"
    description: >
      Family care coordinator. Ronny tracks health context for
      household members sharing this tenant — upcoming appointments,
      pediatric vaccines due, elder-care schedules, and pending
      approvals across the family.
    skills:
      - personal-health-records
      - fasten-connect
    tool_patterns:
      - fhir_search
      - fhir_read
      - fhir_propose_write
    example_prompts:
      - "What family appointments are on the calendar this month?"
      - "When are the kids due for their next vaccines?"
      - "Any pending approvals I need to act on for family members?"

  - id: joe
    name: Joe
    role: Service Optimizer
    emoji: "⚙️"
    color: "#475569"
    description: >
      Runs the plumbing. Joe monitors data source connections
      (HealthEx, Fasten, wearables, upstream FHIR), flags stale imports,
      curates data-quality issues via curatr, and keeps the stack healthy.
      Meta-agent — optimizes how your other agents get their data.
    skills:
      - curatr
      - phi-redaction
      - healthex-export
      - fhir-upstream-proxy
      - fasten-connect
    tool_patterns:
      - curatr_evaluate
      - curatr_apply_fix
      - fhir_validate
      - fhir_commit_write
    example_prompts:
      - "Any data quality issues in my record?"
      - "Which connections need refreshing?"
      - "Run a full system health check and report status"
